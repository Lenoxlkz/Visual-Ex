    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Visual X">
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/pwabuilder-sw.js').then(async (registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
            
            // Background Sync Registration
            if ('sync' in registration) {
              try {
                await registration.sync.register('visualx-sync');
                console.log('Background Sync registered successfully.');
              } catch (err) {
                console.log('Background Sync registration failed:', err);
              }
            }

            // Periodic Background Sync Registration
            if ('periodicSync' in registration) {
              try {
                const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
                if (status.state === 'granted') {
                  await registration.periodicSync.register('visualx-periodic-sync', {
                    minInterval: 24 * 60 * 60 * 1000, // 24 hours
                  });
                  console.log('Periodic Background Sync registered successfully.');
                }
              } catch (err) {
                console.log('Periodic Background Sync registration failed:', err);
              }
            }

          }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
