<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Visual X</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Critical inline CSS: loader + prevent flash of unstyled content -->
    <style>
      /* Minimal critical CSS to avoid FOUC while main CSS/JS loads */
      html,body {height:100%;}
      body.app-loading {overflow:hidden;}
      /* Hide the application root until we are ready */
      body.app-loading app-root {visibility:hidden;}

      /* Fullscreen loader */
      #initial-loader {
        position:fixed;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        background-color:#0b0b0b; /* dark background to match theme */
        color: #fff;
        z-index:9999;
        -webkit-font-smoothing:antialiased;
      }

      /* Spinner */
      .spinner {
        width:56px;
        height:56px;
        border-radius:50%;
        border:6px solid rgba(255,255,255,0.1);
        border-top-color: #ffffff;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Hide loader when body loses the .app-loading class via inline JS */
      body:not(.app-loading) #initial-loader { display:none; }
    </style>

    <!-- Open Graph / Meta tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ais-pre-2c3vkbq3u2erqmhnwu2d46-381092709044.us-west2.run.app/" />
    <meta property="og:title" content="Visual X" />
    <meta property="og:description" content="A dark-themed secure local document and comic viewer." />
    <meta property="og:image" content="https://ais-pre-2c3vkbq3u2erqmhnwu2d46-381092709044.us-west2.run.app/icon.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ais-pre-2c3vkbq3u2erqmhnwu2d46-381092709044.us-west2.run.app/" />
    <meta property="twitter:title" content="Visual X" />
    <meta property="twitter:description" content="A dark-themed secure local document and comic viewer." />
    <meta property="twitter:image" content="https://ais-pre-2c3vkbq3u2erqmhnwu2d46-381092709044.us-west2.run.app/icon.png" />

    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Visual X">

    <!-- Preload main stylesheet (non-blocking) -->
    <link rel="preload" href="/styles.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/styles.css"></noscript>

    <!-- Preload Google Fonts stylesheet (optional) to improve text rendering) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" onload="this.rel='stylesheet'">

    <!-- Inline small script to remove loader when app is ready -->
    <script>
      (function(){
        // Ensure the body initially has the loading class (default in HTML too)
        try { document.documentElement.classList.add('has-js'); } catch(e){}

        // Remove loader when one of these happens (in this order of preference):
        // 1) A custom event 'app:bootstrapped' (future-proof if app dispatches it)
        // 2) When fonts are loaded and DOMContent is interactive
        // 3) Window load
        // 4) Timeout fallback (3s)

        var done = false;
        function finish() {
          if (done) return; done = true;
          document.body.classList.remove('app-loading');
        }

        // Listen for a custom event that Angular (or other boot code) could dispatch
        window.addEventListener('app:bootstrapped', finish);

        // If document.fonts API available, wait for fonts to be ready (improves stability)
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function(){
            // If DOM is already interactive, finish; otherwise wait for DOMContentLoaded
            if (document.readyState === 'interactive' || document.readyState === 'complete') {
              finish();
            } else {
              document.addEventListener('DOMContentLoaded', finish);
            }
          }).catch(function(){ /* ignore */ });
        }

        // Window load as a reliable fallback
        window.addEventListener('load', finish);

        // Final safety timeout so loader doesn't block forever
        setTimeout(finish, 3000);
      })();
    </script>
  </head>
  <body class="app-loading">
    <!-- Initial loader shown until page/app is ready -->
    <div id="initial-loader" aria-hidden="true">
      <div class="spinner" role="status" aria-label="loading"></div>
    </div>

    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/pwabuilder-sw.js').then(async (registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
            
            // Background Sync Registration
            if ('sync' in registration) {
              try {
                await registration.sync.register('visualx-sync');
                console.log('Background Sync registered successfully.');
              } catch (err) {
                console.log('Background Sync registration failed:', err);
              }
            }

            // Periodic Background Sync Registration
            if ('periodicSync' in registration) {
              try {
                const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
                if (status.state === 'granted') {
                  await registration.periodicSync.register('visualx-periodic-sync', {
                    minInterval: 24 * 60 * 60 * 1000, // 24 hours
                  });
                  console.log('Periodic Background Sync registered successfully.');
                }
              } catch (err) {
                console.log('Periodic Background Sync registration failed:', err);
              }
            }

          }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
